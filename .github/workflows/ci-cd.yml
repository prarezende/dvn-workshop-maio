name: CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "dvn-workshop-apps/backend/**"
      - "dvn-workshop-apps/frontend/**"

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 654654554686.dkr.ecr.us-east-1.amazonaws.com

jobs:
  detect-changes:
    name: Detect Changed Applications
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect path changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - "dvn-workshop-apps/backend/**"
            frontend:
              - "dvn-workshop-apps/frontend/**"

  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: dvn-workshop-apps/backend/YoutubeLiveApp
          push: true
          tags: ${{ env.ECR_REGISTRY }}/dvn-workshop/production/backend:${{ steps.meta.outputs.tag }}

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: dvn-workshop-apps/frontend/youtube-live-app
          push: true
          tags: ${{ env.ECR_REGISTRY }}/dvn-workshop/production/frontend:${{ steps.meta.outputs.tag }}

  update-kustomization:
    name: Update Kustomization Tags
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-backend
      - build-frontend
    if: |
      always() &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set image tag
        id: meta
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Update backend image tag in kustomization
        if: needs.detect-changes.outputs.backend == 'true'
        run: |
          cd dvn-workshop-kubernetes
          kustomize edit set image ${{ env.ECR_REGISTRY }}/dvn-workshop/production/backend=${{ env.ECR_REGISTRY }}/dvn-workshop/production/backend:${{ steps.meta.outputs.tag }}

      - name: Update frontend image tag in kustomization
        if: needs.detect-changes.outputs.frontend == 'true'
        run: |
          cd dvn-workshop-kubernetes
          kustomize edit set image ${{ env.ECR_REGISTRY }}/dvn-workshop/production/frontend=${{ env.ECR_REGISTRY }}/dvn-workshop/production/frontend:${{ steps.meta.outputs.tag }}

      - name: Commit and push kustomization update
        run: |
          git add dvn-workshop-kubernetes/kustomization.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update image tags to ${{ steps.meta.outputs.tag }} [skip ci]"
          git pull --rebase origin main
          git push origin main
